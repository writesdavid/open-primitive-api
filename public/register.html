<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get API Key — Open Primitive API</title>
  <link rel="stylesheet" href="https://openprimitive.com/primitive.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f0;
      color: #1a1a1a;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    a { color: #c04010; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .card {
      background: #fff;
      border: 1px solid #d0d0c8;
      border-radius: 8px;
      max-width: 520px;
      width: 100%;
      padding: 48px 40px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #444;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.95rem;
      border: 1px solid #d0d0c8;
      border-radius: 4px;
      background: #fafaf7;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus {
      border-color: #c04010;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    .btn-primary {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: #c04010;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #a03008; }
    .btn-primary:disabled { background: #999; cursor: wait; }

    .error {
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff0f0;
      border: 1px solid #e0c0c0;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #a02020;
      display: none;
    }

    /* Result section */
    .result {
      display: none;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #e0e0d8;
    }

    .result h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .key-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border-radius: 4px;
      padding: 12px 14px;
    }

    .key-value {
      flex: 1;
      font-size: 0.8rem;
      color: #c04010;
      word-break: break-all;
    }

    .btn-copy {
      flex-shrink: 0;
      padding: 6px 12px;
      background: #333;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 3px;
      font-size: 0.75rem;
      transition: background 0.15s;
    }

    .btn-copy:hover { background: #444; }

    .tier-note {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #444;
      padding: 12px 14px;
      background: #f0f0ea;
      border-radius: 4px;
    }

    .example {
      margin-top: 20px;
    }

    .example h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 8px;
    }

    .example pre {
      background: #1a1a1a;
      color: #d0d0c8;
      padding: 14px;
      border-radius: 4px;
      font-size: 0.78rem;
      overflow-x: auto;
      line-height: 1.5;
    }

    .example pre .hl { color: #c04010; }

    .links {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #666;
    }

    .links a { margin-right: 16px; }

    .existing-note {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #888;
      display: none;
    }

    @media (max-width: 560px) {
      .card { padding: 32px 20px; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Get your API key</h1>
  <p class="subtitle">Free. No API key required. No limits.</p>

  <form id="register-form">
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
    <button type="submit" class="btn-primary" id="submit-btn">Get Free API Key</button>
  </form>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <h2>Your API key</h2>
    <div class="key-box">
      <span class="key-value" id="key-display"></span>
      <button class="btn-copy" id="copy-btn" title="Copy to clipboard">Copy</button>
    </div>
    <p class="existing-note" id="existing-note">This email already had a key. Here it is again.</p>
    <div class="tier-note">Free. No API key. No limits.</div>

    <div class="example">
      <h3>Try it</h3>
      <pre>curl -H "X-API-Key: <span class="hl" id="curl-key"></span>" \
  https://api.openprimitive.com/v1/flights</pre>
    </div>

    <div class="links">
      <a href="/">Docs</a>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('register-form');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submit-btn');
  const errorEl = document.getElementById('error');
  const resultEl = document.getElementById('result');
  const keyDisplay = document.getElementById('key-display');
  const curlKey = document.getElementById('curl-key');
  const copyBtn = document.getElementById('copy-btn');
  const existingNote = document.getElementById('existing-note');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.style.display = 'none';
    resultEl.style.display = 'none';
    existingNote.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Generating...';

    try {
      const res = await fetch('/v1/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailInput.value.trim() }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Registration failed.');
      }

      keyDisplay.textContent = data.key;
      curlKey.textContent = data.key;
      resultEl.style.display = 'block';

      if (data.existing) {
        existingNote.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Get Free API Key';
    }
  });

  copyBtn.addEventListener('click', () => {
    const key = keyDisplay.textContent;
    navigator.clipboard.writeText(key).then(() => {
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    });
  });
</script>

</body>
</html>
