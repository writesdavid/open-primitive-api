<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic — Open Primitive</title>
  <link rel="stylesheet" href="https://openprimitive.com/primitive.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', 'SF Mono', 'Menlo', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* Hero number */
    .hero {
      text-align: center;
      padding: 4rem 0 3rem;
    }

    .hero-headline {
      font-size: 1.1rem;
      color: #888;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }

    .hero-headline .agent-pct {
      color: #c04010;
      font-weight: 700;
    }

    .hero-number {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      color: #c04010;
      font-variant-numeric: tabular-nums;
    }

    .hero-label {
      font-size: 1.4rem;
      color: #c04010;
      margin-top: 0.5rem;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .hero-number { font-size: 5rem; }
      .hero-label { font-size: 1rem; }
      body { padding: 1rem; }
    }

    /* Stat cards */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 2rem 0 3rem;
    }

    @media (max-width: 600px) {
      .stat-cards { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-card .value {
      font-size: 2.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card.agent .value { color: #c04010; }
    .stat-card.human .value { color: #666; }
    .stat-card.total .value { color: #e0e0e0; }

    /* Sections */
    .section {
      margin-bottom: 3rem;
    }

    .section h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 1rem;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 0.5rem;
    }

    /* Horizontal bars */
    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 0.6rem;
      gap: 0.75rem;
    }

    .bar-row .bar-label {
      width: 120px;
      flex-shrink: 0;
      font-size: 0.85rem;
      color: #aaa;
      text-align: right;
    }

    .bar-row .bar-track {
      flex: 1;
      height: 28px;
      background: #141414;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .bar-row .bar-fill {
      height: 100%;
      background: #c04010;
      border-radius: 4px;
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .bar-row .bar-count {
      width: 60px;
      flex-shrink: 0;
      font-size: 0.8rem;
      color: #666;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 600px) {
      .bar-row .bar-label { width: 80px; font-size: 0.75rem; }
      .bar-row .bar-count { width: 45px; font-size: 0.7rem; }
    }

    /* Endpoint bars — slightly different color */
    .endpoint-bars .bar-fill {
      background: #884020;
    }

    /* Pulse dot */
    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #c04010;
      border-radius: 50%;
      margin-right: 0.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .live-indicator {
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 2rem;
    }

    /* Count-up animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="live-indicator">
      <span class="live-dot"></span>refreshing every 5 seconds
    </div>

    <div class="hero">
      <p class="hero-headline">Right now, <span class="agent-pct" id="headline-pct">0%</span> of our traffic is machines.</p>
      <div class="hero-number" id="hero-number">0%</div>
      <div class="hero-label">agent traffic</div>
    </div>

    <div class="stat-cards">
      <div class="stat-card total">
        <div class="value" id="stat-total">0</div>
        <div class="label">Total requests</div>
      </div>
      <div class="stat-card agent">
        <div class="value" id="stat-agent">0</div>
        <div class="label">Agent requests</div>
      </div>
      <div class="stat-card human">
        <div class="value" id="stat-human">0</div>
        <div class="label">Human requests</div>
      </div>
    </div>

    <div class="section">
      <h2>By agent</h2>
      <div id="agent-bars"></div>
    </div>

    <div class="section">
      <h2>By endpoint</h2>
      <div id="endpoint-bars" class="endpoint-bars"></div>
    </div>

  </div>

  <script>
    function animateValue(el, start, end, duration, suffix) {
      suffix = suffix || '';
      var startTime = null;
      function step(ts) {
        if (!startTime) startTime = ts;
        var progress = Math.min((ts - startTime) / duration, 1);
        var val = Math.floor(progress * (end - start) + start);
        el.textContent = val.toLocaleString() + suffix;
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function renderBars(containerId, data, maxVal) {
      var container = document.getElementById(containerId);
      if (!data || !data.length) {
        container.innerHTML = '<p style="color:#444;font-size:0.85rem;">No data yet.</p>';
        return;
      }
      var html = '';
      for (var i = 0; i < data.length; i++) {
        var item = data[i];
        var pct = maxVal > 0 ? (item.count / maxVal * 100) : 0;
        html += '<div class="bar-row">' +
          '<span class="bar-label">' + item.name + '</span>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="bar-count">' + item.count.toLocaleString() + '</span>' +
          '</div>';
      }
      container.innerHTML = html;
    }

    var prevTotal = 0, prevAgent = 0, prevHuman = 0;
    var firstLoad = true;

    function fetchStats() {
      fetch('/v1/stats')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var total = data.total || 0;
          var agent = data.agent || 0;
          var human = data.human || 0;
          var pct = total > 0 ? Math.round((agent / total) * 100) : 0;

          var dur = firstLoad ? 800 : 300;

          animateValue(document.getElementById('hero-number'), firstLoad ? 0 : pct, pct, dur, '%');
          document.getElementById('headline-pct').textContent = pct + '%';

          animateValue(document.getElementById('stat-total'), firstLoad ? 0 : prevTotal, total, dur);
          animateValue(document.getElementById('stat-agent'), firstLoad ? 0 : prevAgent, agent, dur);
          animateValue(document.getElementById('stat-human'), firstLoad ? 0 : prevHuman, human, dur);

          prevTotal = total;
          prevAgent = agent;
          prevHuman = human;

          // Agent breakdown
          var agents = data.agents || [];
          agents.sort(function(a, b) { return b.count - a.count; });
          var agentMax = agents.length ? agents[0].count : 0;
          renderBars('agent-bars', agents, agentMax);

          // Endpoint breakdown
          var endpoints = data.endpoints || [];
          endpoints.sort(function(a, b) { return b.count - a.count; });
          var endMax = endpoints.length ? endpoints[0].count : 0;
          renderBars('endpoint-bars', endpoints, endMax);

          firstLoad = false;
        })
        .catch(function() {});
    }

    fetchStats();
    setInterval(fetchStats, 5000);
  </script>
</body>
</html>
