<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status — Open Primitive API</title>
  <link rel="stylesheet" href="https://openprimitive.com/primitive.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', 'SF Mono', 'Menlo', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .overall {
      font-size: 0.95rem;
      margin-bottom: 2rem;
      padding: 1rem;
      border: 1px solid #222;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .overall.all-up { border-color: #1a3a1a; }
    .overall.degraded { border-color: #3a2a1a; }

    .overall-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .overall-dot.up { background: #22c55e; }
    .overall-dot.degraded { background: #f59e0b; }
    .overall-dot.down { background: #ef4444; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #222;
    }

    td {
      padding: 0.75rem;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.85rem;
    }

    .domain-name {
      color: #fff;
      font-weight: 500;
    }

    .source {
      color: #888;
      font-size: 0.75rem;
    }

    .status-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.up {
      background: #22c55e;
      animation: pulse-green 2s ease-in-out infinite;
    }

    .dot.slow {
      background: #f59e0b;
      animation: pulse-yellow 2s ease-in-out infinite;
    }

    .dot.down {
      background: #ef4444;
      animation: pulse-red 1.5s ease-in-out infinite;
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
      50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
    }

    @keyframes pulse-yellow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); }
      50% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
    }

    .status-label { text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
    .status-label.up { color: #22c55e; }
    .status-label.slow { color: #f59e0b; }
    .status-label.down { color: #ef4444; }

    .ms { color: #666; font-size: 0.75rem; }
    .timestamp { color: #555; font-size: 0.7rem; }

    .loading {
      text-align: center;
      padding: 4rem 0;
      color: #555;
    }

    .refresh-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #444;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: #555;
      text-decoration: none;
      font-size: 0.8rem;
    }

    .back-link:hover { color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">&larr; Open Primitive API</a>
    <h1>System Status</h1>
    <div id="overall" class="overall">
      <div class="loading">Checking federal data sources...</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Domain</th>
          <th>Source</th>
          <th>Status</th>
          <th>Response</th>
          <th>Checked</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="5" class="loading">Loading...</td></tr>
      </tbody>
    </table>

    <div class="refresh-note">Auto-refreshes every 30 seconds</div>
  </div>

  <script>
    async function fetchStatus() {
      try {
        const res = await fetch('/v1/status');
        const data = await res.json();
        render(data);
      } catch (e) {
        document.getElementById('overall').innerHTML = '<div class="overall-dot down"></div>Status endpoint unreachable';
      }
    }

    function render(data) {
      const down = data.filter(d => d.status === 'down').length;
      const slow = data.filter(d => d.status === 'slow').length;
      const degraded = down + slow;

      const overall = document.getElementById('overall');
      if (degraded === 0) {
        overall.className = 'overall all-up';
        overall.innerHTML = '<div class="overall-dot up"></div>All systems operational';
      } else {
        overall.className = 'overall degraded';
        const parts = [];
        if (down > 0) parts.push(down + ' down');
        if (slow > 0) parts.push(slow + ' slow');
        const dotClass = down > 0 ? 'down' : 'degraded';
        overall.innerHTML = '<div class="overall-dot ' + dotClass + '"></div>' + parts.join(', ') + ' &mdash; ' + (13 - degraded) + ' of 13 domains operational';
      }

      const rows = document.getElementById('rows');
      rows.innerHTML = data.map(d => {
        const time = d.checkedAt ? new Date(d.checkedAt).toLocaleTimeString() : '--';
        const ms = d.responseMs != null ? d.responseMs + ' ms' : '--';
        return '<tr>' +
          '<td><span class="domain-name">' + d.domain + '</span></td>' +
          '<td><span class="source">' + d.source + '</span></td>' +
          '<td><div class="status-cell"><span class="dot ' + d.status + '"></span><span class="status-label ' + d.status + '">' + d.status + '</span></div></td>' +
          '<td><span class="ms">' + ms + '</span></td>' +
          '<td><span class="timestamp">' + time + '</span></td>' +
          '</tr>';
      }).join('');
    }

    fetchStatus();
    setInterval(fetchStatus, 30000);
  </script>
</body>
</html>
